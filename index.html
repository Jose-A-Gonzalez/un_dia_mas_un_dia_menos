<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Un día más, un día menos ❤️</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            background-color: #0f172a;
            background-image: url('https://i.postimg.cc/fyLPY2xj/Whats-App-Image-2026-06-24-at-10-42-59-PM.jpg');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: white;
            text-shadow: 3px 3px 12px rgba(0, 0, 0, 0.9);
            padding-top: 110px;
        }
        h1 { font-size: 5.2rem; margin-bottom: 100px; }
        #countdown { margin-top: auto; margin-bottom: 65px; text-align: center; }
        .days-number { font-size: 6.3rem; font-weight: 700; line-height: 1; display: block; }
        .days-label { font-size: 1.45rem; font-weight: 400; display: block; margin-top: -8px; margin-bottom: 22px; opacity: 0.9; }
        .time { font-size: 2rem; font-weight: 500; letter-spacing: 1px; }

        /* === Controles de música === */
        #music-controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
            z-index: 100;
        }
        #now-playing {
            font-size: 0.95rem;
            opacity: 0.9;
            text-align: right;
            margin-bottom: 4px;
        }
        .music-buttons {
            display: flex;
            gap: 8px;
            background: rgba(255,255,255,0.08);
            padding: 6px;
            border-radius: 50px;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .music-buttons button {
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            font-size: 1.3rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        .music-buttons button:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.1);
        }
        #play-btn {
            width: 56px;
            height: 56px;
            font-size: 1.5rem;
        }
        @media (max-width: 600px) {
            h1 { font-size: 3.9rem; }
            .days-number { font-size: 5rem; }
            #music-controls { bottom: 12px; right: 12px; }
        }
    </style>
</head>
<body>
    <h1>👩🏾‍🤝‍👨🏽</h1>
    <div id="countdown"></div>

    <!-- Controles de música -->
    <div id="music-controls">
        <div id="now-playing">🎵 Toca el botón para comenzar</div>
        <div class="music-buttons">
            <button onclick="prevTrack()">⏮️</button>
            <button id="play-btn" onclick="togglePlay()">▶️</button>
            <button onclick="nextTrack()">⏭️</button>
        </div>
    </div>

    <audio id="player"></audio>

    <script>
        // =============================================
        // SISTEMA DE VERSIÓN (Auto-actualización)
        // =============================================
        const APP_VERSION = 1; // ← CAMBIA ESTE NÚMERO CADA VEZ QUE ACTUALICES LA PÁGINA

        const savedVersion = localStorage.getItem('app_version');
        if (savedVersion !== null && parseInt(savedVersion) !== APP_VERSION) {
            localStorage.setItem('app_version', APP_VERSION);
            location.reload(true); // Fuerza recarga desde el servidor
        } else {
            localStorage.setItem('app_version', APP_VERSION);
        }

        // === Cuenta regresiva ===
        const targetDate = new Date("2026-12-18T00:00:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance < 0) {
                document.getElementById("countdown").innerHTML = 
                    `<span style="font-size: 2.6rem;">¡Llegó el día! ❤️</span>`;
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);
            const daysLabel = days === 1 ? "día" : "días";

            document.getElementById("countdown").innerHTML = `
                <span class="days-number">${days}</span>
                <span class="days-label">${daysLabel}</span>
                <span class="time">${hours}h ${minutes}m ${seconds}s</span>
            `;
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();

        // === PLAYLIST ===
        const playlist = [
            { src: "music/Coincidir.mp3", title: "Coincidir" },
            { src: "music/Creo_en_ti.mp3", title: "Creo en ti" }
        ];

        let currentTrack = 0;
        const player = document.getElementById('player');
        const playBtn = document.getElementById('play-btn');
        const nowPlaying = document.getElementById('now-playing');

        function loadTrack(index) {
            currentTrack = index;
            player.src = playlist[index].src;
            nowPlaying.textContent = `🎵 ${playlist[index].title}`;
        }

        function togglePlay() {
            if (player.paused || player.ended) {
                player.play().then(() => {
                    playBtn.innerHTML = '⏸️';
                }).catch(() => {
                    alert("No se pudo reproducir la música.\nRevisa que el archivo exista en la carpeta music/");
                });
            } else {
                player.pause();
                playBtn.innerHTML = '▶️';
            }
        }

        function nextTrack() {
            currentTrack = (currentTrack + 1) % playlist.length;
            loadTrack(currentTrack);
            player.play().then(() => {
                playBtn.innerHTML = '⏸️';
            }).catch(() => {});
        }

        function prevTrack() {
            currentTrack = (currentTrack - 1 + playlist.length) % playlist.length;
            loadTrack(currentTrack);
            player.play().then(() => {
                playBtn.innerHTML = '⏸️';
            }).catch(() => {});
        }

        player.addEventListener('ended', () => {
            nextTrack();
        });

        loadTrack(0);

        // Intentar autoplay
        window.addEventListener('load', () => {
            setTimeout(() => {
                player.play().then(() => {
                    playBtn.innerHTML = '⏸️';
                }).catch(() => {});
            }, 500);
        });
    </script>
</body>
</html>
