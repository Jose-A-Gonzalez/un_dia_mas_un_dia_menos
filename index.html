<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#0a0d16">
    <meta name="description" content="Cada segundo me acerca a ti.">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Un día menos">
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" href="./icons/app-icon-192.png" sizes="192x192">
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
    <title>Un día más, un día menos 💚</title>
    <script>
        if (
            window.matchMedia("(display-mode: standalone)").matches ||
            window.navigator.standalone === true
        ) {
            document.documentElement.classList.add("standalone-layout");
        }
    </script>
    <style>
        :root {
            --white: #fffaf6;
            --soft-white: rgba(255, 250, 246, 0.78);
            --glass: rgba(13, 17, 28, 0.40);
            --glass-border: rgba(255, 255, 255, 0.18);
            --accent: #72d99a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            min-height: 100%;
        }

        body {
            min-height: 100svh;
            overflow: hidden;
            background: #0a0d16;
            color: var(--white);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -3;
            background-image: url("./assets/photo.jpg");
            background-position: center;
            background-size: cover;
            filter: saturate(0.82) brightness(0.58);
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            background:
                linear-gradient(180deg, rgba(3, 6, 13, 0.63) 0%, rgba(3, 6, 13, 0.02) 36%, rgba(3, 6, 13, 0.28) 58%, rgba(3, 6, 13, 0.92) 100%),
                linear-gradient(90deg, rgba(3, 6, 13, 0.42), transparent 32%, transparent 68%, rgba(3, 6, 13, 0.42));
        }

        .photo {
            position: fixed;
            inset: 0;
            z-index: -2;
            background-image: url("./assets/photo.jpg");
            background-position: center;
            background-repeat: no-repeat;
            background-size: contain;
        }

        .page {
            position: relative;
            width: min(100%, 1180px);
            min-height: 100svh;
            margin: 0 auto;
            padding: clamp(24px, 4vw, 54px);
            padding-bottom: clamp(10px, 1.5svh, 18px);
            display: grid;
            grid-template-rows: auto 1fr auto;
            gap: 24px;
        }

        .intro {
            text-align: center;
            animation: reveal 900ms ease-out both;
        }

        .eyebrow {
            margin-bottom: 8px;
            color: var(--soft-white);
            font-size: clamp(0.72rem, 1.4vw, 0.88rem);
            font-weight: 650;
            letter-spacing: 0.28em;
            text-transform: uppercase;
        }

        h1 {
            font-family: Georgia, "Times New Roman", serif;
            font-size: clamp(1.8rem, 4vw, 3.25rem);
            font-weight: 400;
            letter-spacing: -0.025em;
            text-shadow: 0 3px 24px rgba(0, 0, 0, 0.65);
        }

        .heart {
            color: var(--accent);
            font-style: normal;
        }

        .bottom {
            align-self: end;
            display: grid;
            justify-items: center;
            gap: clamp(8px, 1.8svh, 16px);
            animation: rise 850ms 120ms ease-out both;
        }

        .countdown-card {
            width: min(660px, 74svh, calc(100vw - 28px));
            padding: clamp(12px, 2.6svh, 28px);
            border: 1px solid var(--glass-border);
            border-radius: clamp(18px, 3svh, 28px);
            background: var(--glass);
            box-shadow: 0 26px 70px rgba(0, 0, 0, 0.42);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
        }

        .countdown-title {
            margin-bottom: clamp(8px, 2svh, 18px);
            text-align: center;
            color: var(--soft-white);
            font-size: clamp(0.68rem, 1.8svh, 1rem);
            letter-spacing: 0.04em;
        }

        .countdown {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: clamp(4px, 1.2svh, 14px);
        }

        .time-unit {
            min-width: 0;
            padding: clamp(6px, 1.4svh, 12px) 4px;
            text-align: center;
            border-radius: clamp(10px, 2svh, 18px);
            background: rgba(255, 255, 255, 0.075);
        }

        .value {
            display: block;
            font-family: Georgia, "Times New Roman", serif;
            font-size: clamp(1.8rem, 6svh, 4.1rem);
            font-variant-numeric: tabular-nums;
            line-height: 0.95;
        }

        .label {
            display: block;
            margin-top: clamp(4px, 1svh, 9px);
            color: var(--soft-white);
            font-size: clamp(0.48rem, 1.2svh, 0.76rem);
            font-weight: 650;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .arrival {
            margin-top: clamp(8px, 1.7svh, 16px);
            text-align: center;
            color: rgba(255, 250, 246, 0.66);
            font-size: clamp(0.58rem, 1.2svh, 0.78rem);
        }

        .music-player {
            position: relative;
            display: flex;
            align-items: center;
            gap: 12px;
            width: min(306px, 42svh, calc(100vw - 28px));
            min-height: clamp(42px, 6.5svh, 58px);
            padding: clamp(5px, 0.9svh, 8px) clamp(7px, 1.1svh, 10px) clamp(5px, 0.9svh, 8px) clamp(12px, 2svh, 18px);
            border: 1px solid var(--glass-border);
            border-radius: 999px;
            background: rgba(13, 17, 28, 0.54);
            box-shadow: 0 14px 38px rgba(0, 0, 0, 0.32);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            transition: width 240ms ease, padding 240ms ease, gap 240ms ease;
        }

        .music-player.is-compact {
            width: clamp(126px, 18svh, 150px);
            padding: clamp(5px, 0.9svh, 8px);
            justify-content: center;
            gap: 0;
        }

        .music-player.is-compact .track,
        .music-player.is-compact .collapse-player-btn {
            display: none;
        }

        .track {
            min-width: min(126px, 15svh);
        }

        .track-kicker {
            display: block;
            margin-bottom: 2px;
            color: rgba(255, 250, 246, 0.56);
            font-size: clamp(0.5rem, 1svh, 0.62rem);
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        #now-playing {
            display: block;
            max-width: 170px;
            overflow: hidden;
            font-size: clamp(0.7rem, 1.4svh, 0.88rem);
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .music-buttons {
            display: flex;
            gap: 5px;
        }

        button {
            width: clamp(30px, 4.5svh, 40px);
            height: clamp(30px, 4.5svh, 40px);
            display: grid;
            place-items: center;
            border: 0;
            border-radius: 50%;
            background: transparent;
            color: white;
            cursor: pointer;
            font-size: clamp(0.78rem, 1.7svh, 1rem);
            transition: background 180ms ease, transform 180ms ease;
        }

        button:hover,
        button:focus-visible {
            background: rgba(255, 255, 255, 0.14);
            outline: none;
            transform: translateY(-1px);
        }

        #play-btn {
            background: var(--white);
            color: #171927;
        }

        #play-btn:hover,
        #play-btn:focus-visible {
            background: #ffffff;
            transform: scale(1.04);
        }

        .collapse-player-btn {
            position: absolute;
            top: -8px;
            right: -8px;
            width: 24px;
            height: 24px;
            border: 1px solid var(--glass-border);
            background: rgba(13, 17, 28, 0.92);
            box-shadow: 0 7px 18px rgba(0, 0, 0, 0.35);
            font-size: 1rem;
            line-height: 1;
        }

        .collapse-player-btn:hover,
        .collapse-player-btn:focus-visible {
            background: rgba(35, 39, 52, 0.96);
            transform: scale(1.05);
        }

        .arrived {
            grid-column: 1 / -1;
            padding: 14px;
            text-align: center;
            font-family: Georgia, "Times New Roman", serif;
            font-size: clamp(2rem, 7vw, 4rem);
        }

        .app-notice {
            position: fixed;
            top: max(18px, env(safe-area-inset-top));
            left: 50%;
            z-index: 20;
            width: min(430px, calc(100vw - 28px));
            display: grid;
            grid-template-columns: auto 1fr auto auto;
            align-items: center;
            gap: 10px;
            padding: 10px 10px 10px 12px;
            border: 1px solid rgba(255, 255, 255, 0.22);
            border-radius: 20px;
            background: rgba(10, 13, 22, 0.88);
            box-shadow: 0 18px 52px rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transform: translateX(-50%);
            animation: notice-in 420ms ease-out both;
        }

        .app-notice[hidden] {
            display: none;
        }

        .update-heart-notice {
            position: fixed;
            top: max(20px, env(safe-area-inset-top));
            right: max(20px, env(safe-area-inset-right));
            z-index: 21;
        }

        .update-heart-notice[hidden] {
            display: none;
        }

        .release-heart {
            display: block;
            width: 38px;
            color: var(--accent);
            filter: drop-shadow(0 6px 12px rgba(0, 0, 0, 0.72)) drop-shadow(0 0 8px rgba(114, 217, 154, 0.24));
            animation: heart-whisper 2.4s ease-in-out infinite;
        }

        .release-heart svg,
        .notice-heart svg {
            display: block;
            width: 100%;
            fill: currentColor;
        }

        .notice-heart {
            width: 38px;
            height: 38px;
            display: grid;
            place-items: center;
            border: 1px solid rgba(114, 217, 154, 0.28);
            border-radius: 13px;
            background: rgba(114, 217, 154, 0.12);
            color: var(--accent);
        }

        .notice-heart svg {
            width: 19px;
        }

        .notice-copy {
            min-width: 0;
        }

        .notice-copy strong,
        .notice-copy span {
            display: block;
        }

        .notice-copy strong {
            margin-bottom: 2px;
            font-family: Georgia, "Times New Roman", serif;
            font-size: 0.96rem;
            font-weight: 400;
        }

        .notice-copy span {
            overflow: hidden;
            color: rgba(255, 250, 246, 0.62);
            font-size: 0.7rem;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .notice-action,
        .notice-dismiss {
            width: auto;
            height: 34px;
            border-radius: 999px;
            font-size: 0.72rem;
            font-weight: 700;
        }

        .notice-action {
            padding: 0 14px;
            background: var(--accent);
            color: #07110c;
        }

        .notice-action:hover,
        .notice-action:focus-visible {
            background: #8ee9af;
        }

        .notice-dismiss {
            width: 34px;
            color: rgba(255, 250, 246, 0.72);
        }

        @keyframes reveal {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes rise {
            from { opacity: 0; transform: translateY(18px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes notice-in {
            from { opacity: 0; transform: translate(-50%, -12px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }

        @media (max-width: 600px) {
            .page {
                padding: max(22px, env(safe-area-inset-top)) 14px max(8px, env(safe-area-inset-bottom));
                gap: 14px;
            }

            .intro {
                position: absolute;
                top: max(
                    22px,
                    env(safe-area-inset-top),
                    calc((100svh - 133.333vw) / 2 - 22px)
                );
                right: 14px;
                left: 14px;
            }

            .countdown-card {
                padding: 14px;
                border-radius: 24px;
            }

            .countdown-title {
                margin-bottom: 10px;
                font-size: 0.82rem;
            }

            .countdown {
                gap: 8px;
            }

            .time-unit {
                padding: 8px 3px;
                border-radius: 14px;
            }

            .value {
                font-size: clamp(2.05rem, 9.5vw, 2.35rem);
            }

            .label {
                margin-top: 6px;
                font-size: 0.62rem;
            }

            .arrival {
                margin-top: 12px;
                font-size: 0.68rem;
            }

            .music-player {
                width: min(100%, 340px, 42svh);
                justify-self: center;
                justify-content: space-between;
                margin-right: max(0px, env(safe-area-inset-right));
            }

            .music-player.is-compact {
                justify-self: end;
            }

            .track {
                min-width: 0;
                flex: 1;
            }

            .app-notice {
                top: auto;
                bottom: max(12px, env(safe-area-inset-bottom));
                grid-template-columns: auto 1fr auto;
                border-radius: 18px;
                animation-name: notice-in-mobile;
            }

            .notice-dismiss {
                position: absolute;
                top: -9px;
                right: -6px;
                width: 28px;
                height: 28px;
                border: 1px solid var(--glass-border);
                background: rgba(10, 13, 22, 0.96);
            }

            .update-heart-notice {
                top: max(14px, env(safe-area-inset-top));
                right: max(14px, env(safe-area-inset-right));
            }

            .release-heart {
                width: 34px;
            }
        }

        @keyframes notice-in-mobile {
            from { opacity: 0; transform: translate(-50%, 12px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }

        @keyframes heart-whisper {
            0%, 100% { opacity: 0.72; transform: scale(1); }
            45% { opacity: 1; transform: scale(1.14); }
        }

        @media (max-width: 600px) and (min-height: 680px) {
            .standalone-layout body::before {
                filter: blur(16px) saturate(0.9) brightness(0.72);
                transform: scale(1.08);
            }

            .standalone-layout body::after {
                background:
                    linear-gradient(180deg, rgba(3, 6, 13, 0.58) 0%, rgba(3, 6, 13, 0.02) 36%, rgba(3, 6, 13, 0.12) 58%, rgba(3, 6, 13, 0.5) 100%),
                    linear-gradient(90deg, rgba(3, 6, 13, 0.34), transparent 32%, transparent 68%, rgba(3, 6, 13, 0.34));
            }

            .standalone-layout .photo {
                background-position: center clamp(46px, 6.5svh, 54px);
            }

            .standalone-layout .intro {
                top: max(28px, env(safe-area-inset-top));
            }

            .standalone-layout .eyebrow {
                font-size: 0.9rem;
                letter-spacing: 0.25em;
            }

            .standalone-layout .bottom {
                gap: 8px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                scroll-behavior: auto !important;
            }
        }
    </style>
</head>
<body>
    <div class="photo" aria-hidden="true"></div>

    <main class="page">
        <header class="intro">
            <p class="eyebrow">Un día más, un día menos</p>
            <h1>Cada segundo me acerca a ti <i class="heart">♥</i></h1>
        </header>

        <div aria-hidden="true"></div>

        <section class="bottom" aria-label="Cuenta regresiva para nuestro encuentro">
            <div class="music-player is-compact" aria-label="Reproductor de nuestra música" aria-expanded="false">
                <button class="collapse-player-btn" id="collapse-player-btn" type="button" aria-label="Ocultar nombre de la canción">−</button>
                <div class="track">
                    <span class="track-kicker">Nuestra canción</span>
                    <span id="now-playing">Coincidir</span>
                </div>
                <div class="music-buttons">
                    <button id="prev-btn" type="button" aria-label="Canción anterior">⏮</button>
                    <button id="play-btn" type="button" aria-label="Reproducir">▶</button>
                    <button id="next-btn" type="button" aria-label="Canción siguiente">⏭</button>
                </div>
            </div>

            <div class="countdown-card">
                <p class="countdown-title">Falta para volver a encontrarnos</p>
                <div class="countdown" id="countdown" aria-live="polite">
                    <div class="time-unit"><span class="value" id="days">000</span><span class="label">días</span></div>
                    <div class="time-unit"><span class="value" id="hours">00</span><span class="label">horas</span></div>
                    <div class="time-unit"><span class="value" id="minutes">00</span><span class="label">minutos</span></div>
                    <div class="time-unit"><span class="value" id="seconds">00</span><span class="label">segundos</span></div>
                </div>
                <p class="arrival">18 de diciembre de 2026 · 12:50 p. m. · Medellín</p>
            </div>
        </section>
    </main>

    <audio id="player" preload="metadata" autoplay></audio>

    <aside class="app-notice" id="install-notice" aria-live="polite" hidden>
        <span class="notice-heart" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M12 21s-7.2-4.35-9.46-8.42C.47 8.87 2.27 4.5 6.44 4.08 8.7 3.85 10.6 5 12 6.78c1.4-1.78 3.3-2.93 5.56-2.7 4.17.42 5.97 4.79 3.9 8.5C19.2 16.65 12 21 12 21Z"/></svg>
        </span>
        <span class="notice-copy">
            <strong>Guarda nuestro rincón</strong>
            <span>Ábrelo como una aplicación</span>
        </span>
        <button class="notice-action" id="install-app-btn" type="button">Instalar</button>
        <button class="notice-dismiss" id="dismiss-install-btn" type="button" aria-label="Ahora no">×</button>
    </aside>

    <aside class="update-heart-notice" id="update-notice" role="status" aria-live="polite" hidden>
        <span class="release-heart" aria-label="Hay una nueva sorpresa">
            <svg viewBox="0 0 24 24"><path d="M12 21s-7.2-4.35-9.46-8.42C.47 8.87 2.27 4.5 6.44 4.08 8.7 3.85 10.6 5 12 6.78c1.4-1.78 3.3-2.93 5.56-2.7 4.17.42 5.97 4.79 3.9 8.5C19.2 16.65 12 21 12 21Z"/></svg>
        </span>
    </aside>

    <script>
        const targetDate = new Date("2026-12-18T12:50:00-05:00").getTime();
        const countdown = document.getElementById("countdown");
        const daysElement = document.getElementById("days");
        const hoursElement = document.getElementById("hours");
        const minutesElement = document.getElementById("minutes");
        const secondsElement = document.getElementById("seconds");

        let countdownTimer;

        function updateCountdown() {
            const distance = targetDate - Date.now();

            if (distance <= 0) {
                clearInterval(countdownTimer);
                countdown.innerHTML = '<p class="arrived">Al fin juntos ❤️</p>';
                return;
            }

            const day = 1000 * 60 * 60 * 24;
            const hour = 1000 * 60 * 60;
            const minute = 1000 * 60;

            const days = Math.floor(distance / day);
            const hours = Math.floor((distance % day) / hour);
            const minutes = Math.floor((distance % hour) / minute);
            const seconds = Math.floor((distance % minute) / 1000);

            daysElement.textContent = String(days).padStart(3, "0");
            hoursElement.textContent = String(hours).padStart(2, "0");
            minutesElement.textContent = String(minutes).padStart(2, "0");
            secondsElement.textContent = String(seconds).padStart(2, "0");
        }

        updateCountdown();
        countdownTimer = setInterval(updateCountdown, 1000);

        const playlist = [
            {
                src: "./music/Coincidir.mp3",
                title: "Coincidir"
            },
            {
                src: "./music/Creo_en_ti.mp3",
                title: "Creo en ti"
            }
        ];

        let currentTrack = 0;
        const player = document.getElementById("player");
        const musicPlayer = document.querySelector(".music-player");
        const playBtn = document.getElementById("play-btn");
        const collapsePlayerBtn = document.getElementById("collapse-player-btn");
        const nowPlaying = document.getElementById("now-playing");

        function expandPlayer() {
            musicPlayer.classList.remove("is-compact");
            musicPlayer.setAttribute("aria-expanded", "true");
        }

        function collapsePlayer() {
            musicPlayer.classList.add("is-compact");
            musicPlayer.setAttribute("aria-expanded", "false");
        }

        function syncPlayerState() {
            const isPlaying = !player.paused && !player.ended;
            playBtn.textContent = isPlaying ? "❚❚" : "▶";
            playBtn.setAttribute("aria-label", isPlaying ? "Pausar" : "Reproducir");
        }

        function loadTrack(index) {
            currentTrack = index;
            player.src = playlist[index].src;
            nowPlaying.textContent = playlist[index].title;
        }

        async function playCurrentTrack() {
            try {
                await player.play();
            } catch (error) {
                syncPlayerState();
                nowPlaying.textContent = "Toca reproducir para escuchar";
            }
        }

        async function tryAutoplay() {
            try {
                await player.play();
            } catch (error) {
                collapsePlayer();
                syncPlayerState();
            }
        }

        function changeTrack(direction, revealPlayer = true) {
            if (revealPlayer) {
                expandPlayer();
            }
            currentTrack = (currentTrack + direction + playlist.length) % playlist.length;
            loadTrack(currentTrack);
            playCurrentTrack();
        }

        playBtn.addEventListener("click", () => {
            expandPlayer();
            if (player.paused || player.ended) {
                playCurrentTrack();
            } else {
                player.pause();
            }
        });

        document.getElementById("prev-btn").addEventListener("click", () => changeTrack(-1));
        document.getElementById("next-btn").addEventListener("click", () => changeTrack(1));
        collapsePlayerBtn.addEventListener("click", collapsePlayer);
        player.addEventListener("play", () => {
            syncPlayerState();
            expandPlayer();
        });
        player.addEventListener("pause", syncPlayerState);
        player.addEventListener("ended", () => changeTrack(1, false));
        player.addEventListener("error", () => {
            syncPlayerState();
            nowPlaying.textContent = "No se pudo cargar la canción";
        });

        loadTrack(0);
        syncPlayerState();
        tryAutoplay();

        const installNotice = document.getElementById("install-notice");
        const updateNotice = document.getElementById("update-notice");
        const installAppBtn = document.getElementById("install-app-btn");
        let deferredInstallPrompt = null;
        // Para una sorpresa importante, cambia el identificador y activa "show".
        const importantRelease = {
            id: "pwa-inicial-v1",
            show: false
        };

        function isStandalone() {
            return window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true;
        }

        function showInstallNotice() {
            if (!deferredInstallPrompt || isStandalone() || !updateNotice.hidden) {
                return;
            }

            const dismissedAt = Number(localStorage.getItem("install-notice-dismissed-at"));
            const sevenDays = 7 * 24 * 60 * 60 * 1000;

            if (!dismissedAt || Date.now() - dismissedAt > sevenDays) {
                installNotice.hidden = false;
            }
        }

        window.addEventListener("beforeinstallprompt", (event) => {
            event.preventDefault();
            deferredInstallPrompt = event;
            window.setTimeout(showInstallNotice, 2600);
        });

        installAppBtn.addEventListener("click", async () => {
            if (!deferredInstallPrompt) {
                return;
            }

            deferredInstallPrompt.prompt();
            const choice = await deferredInstallPrompt.userChoice;
            deferredInstallPrompt = null;
            installNotice.hidden = true;

            if (choice.outcome !== "accepted") {
                localStorage.setItem("install-notice-dismissed-at", String(Date.now()));
            }
        });

        document.getElementById("dismiss-install-btn").addEventListener("click", () => {
            installNotice.hidden = true;
            localStorage.setItem("install-notice-dismissed-at", String(Date.now()));
        });

        window.addEventListener("appinstalled", () => {
            deferredInstallPrompt = null;
            installNotice.hidden = true;
        });

        function showImportantReleaseNotice() {
            if (!importantRelease.show) {
                return;
            }

            const seenRelease = localStorage.getItem("important-release-seen");
            if (seenRelease === importantRelease.id) {
                return;
            }

            installNotice.hidden = true;
            updateNotice.hidden = false;
            localStorage.setItem("important-release-seen", importantRelease.id);
            window.setTimeout(() => updateNotice.hidden = true, 6000);
        }

        showImportantReleaseNotice();

        if ("serviceWorker" in navigator) {
            window.addEventListener("load", async () => {
                try {
                    const registration = await navigator.serviceWorker.register("./service-worker.js", {
                        updateViaCache: "none"
                    });

                    const readyRegistration = await navigator.serviceWorker.ready;
                    readyRegistration.active?.postMessage({ type: "CACHE_MUSIC" });

                    document.addEventListener("visibilitychange", () => {
                        if (document.visibilityState === "visible") {
                            registration.update();
                        }
                    });
                } catch (error) {
                    console.warn("No se pudo activar el modo aplicación.", error);
                }
            });

            navigator.serviceWorker.addEventListener("controllerchange", async () => {
                const registration = await navigator.serviceWorker.ready;
                registration.active?.postMessage({ type: "CACHE_MUSIC" });
            });
        }

    </script>
</body>
</html>
